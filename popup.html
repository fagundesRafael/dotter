<!DOCTYPE html>
<html>
<head>
  <title>dotter</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; width: 400px; }
    h2 { margin-top: 0; }
    #loading { display: none; }
    button { margin: 5px 0; padding: 8px; cursor: pointer; }
    textarea { width: 100%; height: 200px; margin-top: 10px; }
    ul { padding-left: 18px; }
    .group { margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px; }
    label { display: block; margin-top: 5px; }
  </style>
</head>
<body>
  <h2>dotter</h2>
  <p id="status">⏳ Aguardando PDF...</p>
  <input type="file" id="pdfInput" accept="application/pdf" />

  <div id="loading">Carregando PDF...</div>

  <div class="group">
    <h3>Procedimentos</h3>
    <ul id="proceduresList"></ul>
  </div>

  <div class="group">
    <h3>Pessoas Envolvidas</h3>
    <ul id="personsList"></ul>
  </div>

  <div class="group">
    <h3>Relatórios</h3>
    <button id="analyzeBtn" disabled>Analisar Pendências</button>
    <button id="finalReportBtn" disabled>Relatório Final</button>
  </div>

  <div class="group">
    <h3>Oitivas</h3>
    <label for="oitivaType">Tipo de Oitiva:</label>
    <select id="oitivaType">
      <option value="Declaração">Declaração</option>
      <option value="Depoimento">Depoimento</option>
      <option value="Interrogatório">Interrogatório</option>
    </select>

    <label for="qtdPerguntas">Qtd. de Perguntas:</label>
    <input type="number" id="qtdPerguntas" min="1" />

    <button id="generateOitivasBtn" disabled>Gerar Oitivas</button>
  </div>

  <textarea id="outputArea" placeholder="Saída dos relatórios e oitivas..."></textarea>

  <div class="group">
    <button id="configApiBtn">Configurar chave API GEMINI</button>
  </div>

  <!-- Libs externas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.8.162/pdf.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

  <!-- Script principal -->
  <script src="popup.js"></script>
</body>
</html>
